services:
  specmatic:
    image: specmatic/specmatic:latest
    depends_on:
      appwrite:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - ../specs:/usr/src/specs
    working_dir: /usr/src/app
    command: test --host appwrite --port 80
    networks:
      - appwrite
    environment:
      - SPECMATIC_GENERATIVE_TESTS=true

  specmatic-validate:
    image: specmatic/specmatic:latest
    volumes:
      - .:/usr/src/app
      - ../specs:/usr/src/specs
    working_dir: /usr/src/app
    command: examples validate
