---
name: "Contract Tests"

on:
  push:
    branches: ["master","main"]
  pull_request:
    branches: ["master","main"]

env:
  COMPOSE_FILE: docker-compose.yml:docker-compose.override.yml

jobs:
  specmatic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Appwrite
        uses: actions/checkout@v4
        with:
          path: appwrite

      - name: Checkout Specs
        uses: actions/checkout@v4
        with:
          repository: appwrite/specs
          path: specs

      - name: Start Appwrite
        working-directory: ./appwrite
        run: |
          sed -i 's|image: appwrite/vibes:.*|image: alpine:latest|g' docker-compose.yml
          docker compose build
          docker compose up -d

      - name: Wait for Appwrite to be healthy
        working-directory: ./appwrite
        run: |
          # Wait until the Appwrite health endpoint returns 200
          timeout=300
          interval=5
          elapsed=0
          while true; do
            status=$(docker compose exec -T appwrite curl -s -o /dev/null -w "%{http_code}" http://localhost/health || echo 000)
            if [ "$status" -eq 200 ]; then
              echo "Appwrite is healthy"
              break
            fi
            if [ $elapsed -ge $timeout ]; then
              echo "Timed out waiting for Appwrite health"
              exit 1
            fi
            echo "Waiting for Appwrite to be healthy... (status $status)"
            sleep $interval
            elapsed=$((elapsed+interval))
          done

      - name: Setup Environment and Authentication
        working-directory: ./appwrite
        run: |
          docker compose exec -e APPWRITE_MASTER_KEY=${{ secrets.APPWRITE_MASTER_KEY }} \
            appwrite sh tests/contract/setup_env.sh

      - name: Validate External Examples
        working-directory: ./appwrite
        run: |
          docker compose -f docker-compose.yml \
            -f docker-compose.specmatic.yml \
            run specmatic-validate

      - name: Run Specmatic Contract Tests
        working-directory: ./appwrite
        run: |
          docker compose -f docker-compose.yml \
            -f docker-compose.specmatic.yml \
            up specmatic \
            --abort-on-container-exit

      - name: Stop Containers
        if: always()
        working-directory: ./appwrite
        run: docker compose down

